<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Strategy Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05080e; color: #c8d6e5; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(91,141,238,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(91,141,238,0.02) 1px, transparent 1px); background-size: 48px 48px; }
    .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px 28px 80px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #141e2e; padding-bottom: 20px; margin-bottom: 0; }
    .header h1 { font-size: 28px; font-weight: 800; color: #e0e8f0; letter-spacing: -0.02em; }
    .header .sub { font-size: 11px; color: #445566; margin-top: 6px; letter-spacing: 0.1em; }
    .header .meta { text-align: right; }
    .header .timestamp { font-size: 11px; color: #556677; }
    .refresh-btn { margin-top: 8px; background: linear-gradient(135deg, #5b8dee, #4ecdc4); color: #000; border: none; border-radius: 6px; padding: 8px 18px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid #141e2e; }
    .tab { padding: 14px 24px; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: #556677; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: #889aaa; }
    .tab.active { color: #e0e8f0; border-bottom-color: #5b8dee; }

    .status { text-align: center; padding: 80px 0; }
    .status .icon { font-size: 48px; margin-bottom: 16px; }
    .status .msg { font-size: 14px; color: #667788; }
    .status .detail { font-size: 11px; color: #445566; margin-top: 8px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.7; }

    .signal-section { background: #0a0f18; border: 1px solid #1a2332; border-radius: 10px; padding: 24px; margin-bottom: 28px; }
    .section-title { font-size: 11px; color: #445566; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 16px; }
    .section-sub { font-size: 10px; color: #334455; margin-bottom: 16px; }
    .signal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 900px) { .signal-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .signal-grid { grid-template-columns: 1fr; } }
    .signal-card { padding: 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
    .signal-card:hover { transform: translateY(-1px); }
    .signal-card .label { font-size: 10px; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 8px; }
    .signal-card .ticker { font-size: 22px; font-weight: 800; color: #e0e8f0; margin-bottom: 4px; }
    .signal-card .name { font-size: 10px; color: #667788; margin-bottom: 8px; }
    .signal-card .summary { font-size: 10px; color: #889aaa; line-height: 1.5; }
    .signal-card .scores { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
    .signal-card .scores span { font-size: 10px; color: #445566; }
    .signal-card .scores .val { font-size: 12px; font-weight: 700; }

    .ranking { margin-top: 28px; background: #0a0f18; border: 1px solid #1a2332; border-radius: 10px; padding: 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { padding: 8px 10px; text-align: left; color: #445566; font-size: 9px; letter-spacing: 0.1em; font-weight: 600; border-bottom: 1px solid #1a2332; }
    td { padding: 10px 10px; border-bottom: 1px solid #0f1520; }
    tr:hover td { background: #0d1420; }
    .role-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; }

    .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(5,8,14,0.92); z-index: 100; overflow-y: auto; padding: 40px 28px; }
    .detail-overlay.active { display: block; }
    .detail-content { max-width: 900px; margin: 0 auto; }
    .detail-back { background: none; border: 1px solid #1a2332; border-radius: 4px; color: #667788; font-family: inherit; font-size: 11px; padding: 6px 14px; cursor: pointer; margin-bottom: 20px; }
    .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    @media (max-width: 700px) { .score-grid { grid-template-columns: repeat(2, 1fr); } }
    .score-card { padding: 18px; background: #0a0f18; border: 1px solid #141e2e; border-radius: 8px; }
    .score-card .layer { font-size: 10px; color: #445566; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
    .score-card .score-val { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .score-card .rationale { font-size: 10px; color: #667788; line-height: 1.5; }
    .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    @media (max-width: 600px) { .info-row { grid-template-columns: 1fr; } }
    .info-box { padding: 18px; background: #0a0f18; border: 1px solid #141e2e; border-radius: 8px; }
    .info-box .box-title { font-size: 10px; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 10px; }
    .info-box .item { font-size: 10px; color: #889aaa; line-height: 1.6; margin-bottom: 4px; }

    /* Paper Trader */
    .pt-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    @media (max-width: 800px) { .pt-stats { grid-template-columns: repeat(2, 1fr); } }
    .pt-stat { background: #0a0f18; border: 1px solid #1a2332; border-radius: 8px; padding: 18px; }
    .pt-stat .label { font-size: 9px; color: #445566; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 8px; }
    .pt-stat .value { font-size: 24px; font-weight: 800; color: #e0e8f0; }
    .pt-stat .sub { font-size: 10px; margin-top: 4px; }
    .pt-chart { background: #0a0f18; border: 1px solid #1a2332; border-radius: 10px; padding: 24px; margin-bottom: 28px; }
    .pt-chart svg { width: 100%; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="status"><div class="icon">📊</div><div class="msg">Loading...</div></div>
  </div>
  <div class="detail-overlay" id="detailOverlay"><div class="detail-content" id="detailContent"></div></div>

  <script>
    const HOLDINGS = {
      MOS: { name: "Mosaic", accent: "#2a9d8f" }, ASML: { name: "ASML", accent: "#5b8dee" },
      SMH: { name: "VanEck Semis", accent: "#7c5cbf" }, ENB: { name: "Enbridge", accent: "#e8963e" },
      ETHA: { name: "iShares ETH", accent: "#627eea" }, GLNCY: { name: "Glencore", accent: "#5ba784" },
      IBIT: { name: "iShares BTC", accent: "#f7931a" }, KOF: { name: "Coca-Cola FEMSA", accent: "#e63946" },
      "PBR.A": { name: "Petrobras", accent: "#00a651" }, AMKBY: { name: "Maersk", accent: "#009fda" },
      SPY: { name: "S&P 500", accent: "#8899aa" },
    };
    const ROLES = {
      tacticalBuy: { label: "TACTICAL BUY", icon: "⚡", color: "#00ff88", bg: "rgba(0,255,136,0.08)", border: "rgba(0,255,136,0.25)" },
      positionalBuy: { label: "POSITIONAL BUY", icon: "📐", color: "#4ecdc4", bg: "rgba(78,205,196,0.08)", border: "rgba(78,205,196,0.25)" },
      strategicBuy: { label: "STRATEGIC BUY", icon: "🏗️", color: "#5b8dee", bg: "rgba(91,141,238,0.08)", border: "rgba(91,141,238,0.25)" },
      trim: { label: "TRIM", icon: "✂️", color: "#ff6b6b", bg: "rgba(255,107,107,0.08)", border: "rgba(255,107,107,0.25)" },
    };
    const scoreColor = s => s<=-60?"#00ff88":s<=-25?"#4ecdc4":s<=24?"#8899aa":s<=59?"#f4a261":"#ff6b6b";
    const zColor = z => z<=-1.5?"#00ff88":z<=-0.5?"#4ecdc4":z<=0.5?"#8899aa":z<=1.5?"#f4a261":"#ff6b6b";
    const fmtPct = v => `${(v||0)>=0?"+":""}${(v||0).toFixed(2)}%`;
    const pctColor = v => (v||0)>=0?"#4ecdc4":"#ff6b6b";
    const fmtMoney = v => v >= 1000000 ? `$${(v/1000000).toFixed(2)}M` : v >= 1000 ? `$${(v/1000).toFixed(1)}K` : `$${v.toFixed(0)}`;

    let DATA = null, PORTFOLIO = null, CLAIRE = null, currentTab = "signals";

    async function loadData() {
      try {
        const [sigResp, ptResp, claireResp] = await Promise.all([
          fetch("signal-data.json?" + Date.now()),
          fetch("history/paper-portfolio.json?" + Date.now()).catch(() => null),
          fetch("history/claire.json?" + Date.now()).catch(() => null),
        ]);
        if (sigResp.ok) DATA = await sigResp.json();
        if (ptResp?.ok) PORTFOLIO = await ptResp.json();
        if (claireResp?.ok) CLAIRE = await claireResp.json();
        render();
      } catch (e) {
        document.getElementById("app").innerHTML = `<div class="status"><div class="icon">⏳</div><div class="msg">No data yet</div><div class="detail">Run the workflow from the Actions tab, then refresh.</div></div>`;
      }
    }

    function setTab(tab) { currentTab = tab; render(); }

    function render() {
      if (!DATA) { document.getElementById("app").innerHTML = `<div class="status"><div class="icon">⏳</div><div class="msg">No signal data</div></div>`; return; }
      const { normalized, assignments, timestamp } = DATA;
      const ts = new Date(timestamp).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });

      const tabsHTML = `
        <div class="tabs">
          <div class="tab ${currentTab==='signals'?'active':''}" onclick="setTab('signals')">SIGNALS</div>
          <div class="tab ${currentTab==='trader'?'active':''}" onclick="setTab('trader')">PAPER TRADER</div>
          <div class="tab ${currentTab==='claire'?'active':''}" onclick="setTab('claire')">CLAIRE</div>
        </div>`;

      if (currentTab === "signals") renderSignals(normalized, assignments, ts, tabsHTML);
      else if (currentTab === "trader") renderTrader(ts, tabsHTML);
      else renderClaire(ts, tabsHTML);
    }

    // ─── SIGNALS TAB ────────────────────────────────────────────────────────
    function renderSignals(normalized, assignments, ts, tabsHTML) {
      const sorted = [...normalized].sort((a,b) => (a.z?.composite??0) - (b.z?.composite??0));
      const find = sym => normalized.find(s => s.symbol === sym);
      const getRole = sym => sym===assignments.tacticalBuy?"tacticalBuy":sym===assignments.positionalBuy?"positionalBuy":sym===assignments.strategicBuy?"strategicBuy":sym===assignments.trim?"trim":null;

      const cards = ["tacticalBuy","positionalBuy","strategicBuy","trim"].map(key => {
        const sym = assignments[key]; const s = find(sym); const r = ROLES[key]; const h = HOLDINGS[sym]||{};
        if (!s) return `<div class="signal-card" style="background:#0d1420;border:1px solid #141e2e">—</div>`;
        const det = s._scoring?.deterministic ?? ""; const llm = s._scoring?.llm ?? "";
        return `<div class="signal-card" style="background:${r.bg};border:1px solid ${r.border}" onclick="showDetail('${sym}')">
          <div class="label" style="color:${r.color}">${r.icon} ${r.label}</div>
          <div class="ticker">${sym}</div><div class="name">${h.name||""}</div>
          <div class="summary">${(s.composite?.summary||"").slice(0,100)}</div>
          <div class="scores"><span>Raw</span><span class="val" style="color:${scoreColor(s.composite?.score||0)}">${s.composite?.score??"—"}</span>
          <span style="margin-left:6px">D:${det} L:${llm}</span></div></div>`;
      }).join("");

      const rows = sorted.map((s,i) => {
        const role = getRole(s.symbol); const r = role ? ROLES[role] : null; const h = HOLDINGS[s.symbol]||{}; const km = s.key_metric;
        const badge = r ? `<span class="role-badge" style="background:${r.bg};border:1px solid ${r.border};color:${r.color}">${r.icon} ${r.label}</span>` : `<span class="role-badge" style="background:rgba(85,102,119,0.04);border:1px solid rgba(85,102,119,0.12);color:#556677">━ HOLD</span>`;
        const det = s._scoring?.deterministic??""; const llm = s._scoring?.llm??"";
        return `<tr onclick="showDetail('${s.symbol}')" style="cursor:pointer">
          <td style="color:#334455">${i+1}</td>
          <td><div style="font-weight:800;font-size:14px;color:${h.accent||'#e0e8f0'}">${s.symbol}</div><div style="font-size:10px;color:#556677">${h.name||""}</div></td>
          <td style="text-align:right"><div style="font-size:14px;font-weight:700;color:#e0e8f0">$${s.price?.current?.toFixed?.(2)||"—"}</div><div style="font-size:10px;color:${pctColor(s.price?.change_pct)}">${fmtPct(s.price?.change_pct)}</div></td>
          <td style="text-align:center"><div style="font-size:16px;font-weight:800;color:${scoreColor(s.composite?.score??0)}">${s.composite?.score??0}</div><div style="font-size:8px;color:#334455">D:${det} L:${llm}</div></td>
          <td style="text-align:center;color:${scoreColor(s.tactical?.score??0)}">${s.tactical?.score??0}</td>
          <td style="text-align:center;color:${scoreColor(s.positional?.score??0)}">${s.positional?.score??0}</td>
          <td style="text-align:center;color:${scoreColor(s.strategic?.score??0)}">${s.strategic?.score??0}</td>
          <td>${badge}</td>
          <td style="font-size:10px;color:#889aaa">${km?.name?`<span style="color:#556677">${km.name}:</span> ${km.value}`:"—"}</td></tr>`;
      }).join("");

      document.getElementById("app").innerHTML = `
        <div class="header"><div><h1>PORTFOLIO STRATEGY HUB</h1><div class="sub">HYBRID SCORING (50% QUANT + 50% LLM) • Z-SCORE NORMALIZED</div></div>
          <div class="meta"><div class="timestamp">Updated: ${ts}</div><button class="refresh-btn" onclick="loadData()">REFRESH</button></div></div>
        ${tabsHTML}
        <div class="signal-section"><div class="section-title">DAILY SIGNAL</div><div class="signal-grid">${cards}</div></div>
        <div class="ranking"><div class="section-title">COMPOSITE RANKINGS</div><div class="section-sub">D = deterministic, L = LLM, blended 50/50</div>
          <table><thead><tr><th>#</th><th>HOLDING</th><th style="text-align:right">PRICE</th><th style="text-align:center">COMP</th>
          <th style="text-align:center">TAC</th><th style="text-align:center">POS</th><th style="text-align:center">STR</th><th>ROLE</th><th>KEY METRIC</th></tr></thead>
          <tbody>${rows}</tbody></table></div>`;
    }

    // ─── PAPER TRADER TAB ───────────────────────────────────────────────────
    function renderTrader(ts, tabsHTML) {
      if (!PORTFOLIO) {
        document.getElementById("app").innerHTML = `
          <div class="header"><div><h1>PORTFOLIO STRATEGY HUB</h1><div class="sub">PAPER TRADER</div></div>
            <div class="meta"><div class="timestamp">Updated: ${ts}</div><button class="refresh-btn" onclick="loadData()">REFRESH</button></div></div>
          ${tabsHTML}
          <div class="status"><div class="icon">📈</div><div class="msg">No paper trading data yet</div>
            <div class="detail">The paper trader runs after each signal generation. Data will appear here after the first complete workflow run.</div></div>`;
        return;
      }

      const p = PORTFOLIO;
      const latest = p.history[p.history.length - 1];
      const totalVal = p.total_value || latest?.total_value || 0;
      const totalDep = p.total_deposited || 0;
      const pnl = latest?.pnl || 0;
      const pnlPct = latest?.pnl_pct || 0;

      // ── Stat cards
      const stats = `
        <div class="pt-stats">
          <div class="pt-stat"><div class="label">PORTFOLIO VALUE</div><div class="value">${fmtMoney(totalVal)}</div><div class="sub" style="color:#556677">Day ${p.day_count}</div></div>
          <div class="pt-stat"><div class="label">TOTAL DEPOSITED</div><div class="value">${fmtMoney(totalDep)}</div><div class="sub" style="color:#556677">$1M + $10K/day</div></div>
          <div class="pt-stat"><div class="label">P&L</div><div class="value" style="color:${pnl>=0?'#4ecdc4':'#ff6b6b'}">${pnl>=0?'+':''}${fmtMoney(Math.abs(pnl))}</div><div class="sub" style="color:${pnlPct>=0?'#4ecdc4':'#ff6b6b'}">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</div></div>
          <div class="pt-stat"><div class="label">CASH</div><div class="value">${fmtMoney(latest?.cash || 0)}</div><div class="sub" style="color:#556677">${((latest?.cash||0)/totalVal*100).toFixed(1)}% of portfolio</div></div>
        </div>`;

      // ── Equity curve (SVG)
      const hist = p.history || [];
      let chartHTML = "";
      if (hist.length >= 2) {
        const W = 800, H = 200, PAD = 40;
        const values = hist.map(h => h.total_value);
        const deposits = hist.map(h => h.total_deposited);
        const minV = Math.min(...values, ...deposits) * 0.995;
        const maxV = Math.max(...values, ...deposits) * 1.005;
        const scaleX = i => PAD + (i / (hist.length - 1)) * (W - PAD * 2);
        const scaleY = v => H - PAD - ((v - minV) / (maxV - minV)) * (H - PAD * 2);

        const valueLine = values.map((v, i) => `${i===0?'M':'L'}${scaleX(i).toFixed(1)},${scaleY(v).toFixed(1)}`).join(" ");
        const depositLine = deposits.map((v, i) => `${i===0?'M':'L'}${scaleX(i).toFixed(1)},${scaleY(v).toFixed(1)}`).join(" ");

        // Y-axis labels
        const ySteps = 5;
        const yLabels = Array.from({length: ySteps + 1}, (_, i) => {
          const v = minV + (maxV - minV) * (i / ySteps);
          return `<text x="${PAD-4}" y="${scaleY(v).toFixed(1)}" text-anchor="end" fill="#334455" font-size="9">${fmtMoney(v)}</text>`;
        }).join("");

        // X-axis labels (first, middle, last)
        const xLabels = [0, Math.floor(hist.length/2), hist.length-1].map(i => {
          if (!hist[i]) return "";
          return `<text x="${scaleX(i).toFixed(1)}" y="${H-8}" text-anchor="middle" fill="#334455" font-size="9">${hist[i].date?.slice(5)||""}</text>`;
        }).join("");

        // Fill area between curves
        const areaAbove = values.map((v, i) => `${scaleX(i).toFixed(1)},${scaleY(v).toFixed(1)}`).join(" ");
        const areaBelow = [...deposits].reverse().map((v, i) => `${scaleX(deposits.length-1-i).toFixed(1)},${scaleY(v).toFixed(1)}`).join(" ");

        chartHTML = `
          <div class="pt-chart">
            <div class="section-title">EQUITY CURVE</div>
            <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
              <polygon points="${areaAbove} ${areaBelow}" fill="${pnl>=0?'rgba(78,205,196,0.08)':'rgba(255,107,107,0.08)'}" />
              <path d="${depositLine}" fill="none" stroke="#334455" stroke-width="1.5" stroke-dasharray="4,3" />
              <path d="${valueLine}" fill="none" stroke="${pnl>=0?'#4ecdc4':'#ff6b6b'}" stroke-width="2" />
              ${yLabels}${xLabels}
              <text x="${W-PAD}" y="20" text-anchor="end" fill="#4ecdc4" font-size="9">— Portfolio</text>
              <text x="${W-PAD}" y="32" text-anchor="end" fill="#334455" font-size="9">- - Deposited</text>
            </svg>
          </div>`;
      } else {
        chartHTML = `<div class="pt-chart"><div class="section-title">EQUITY CURVE</div><div style="color:#334455;font-size:11px;padding:40px 0;text-align:center">Chart requires 2+ days of data</div></div>`;
      }

      // ── Holdings breakdown
      const holdings = Object.entries(p.holdings || {}).map(([sym, h]) => {
        const price = DATA?.normalized?.find(s => s.symbol === sym)?.price?.current || 0;
        const mktVal = h.shares * price;
        const pnl = mktVal - h.cost_basis;
        const pnlPct = h.cost_basis > 0 ? (pnl / h.cost_basis) * 100 : 0;
        return { sym, ...h, price, mktVal, pnl, pnlPct };
      }).sort((a, b) => b.mktVal - a.mktVal);

      const totalHoldings = holdings.reduce((s, h) => s + h.mktVal, 0);

      const holdingRows = holdings.map(h => {
        const accent = HOLDINGS[h.sym]?.accent || "#e0e8f0";
        const weight = totalHoldings > 0 ? (h.mktVal / totalHoldings * 100).toFixed(1) : 0;
        return `<tr>
          <td style="font-weight:700;color:${accent}">${h.sym}</td>
          <td style="text-align:right">${h.shares.toFixed(1)}</td>
          <td style="text-align:right">$${h.price.toFixed(2)}</td>
          <td style="text-align:right;font-weight:600">$${h.mktVal.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",")}</td>
          <td style="text-align:right">${weight}%</td>
          <td style="text-align:right;color:${h.pnl>=0?'#4ecdc4':'#ff6b6b'}">${h.pnl>=0?'+':''}$${h.pnl.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",")}</td>
          <td style="text-align:right;color:${h.pnlPct>=0?'#4ecdc4':'#ff6b6b'}">${h.pnlPct>=0?'+':''}${h.pnlPct.toFixed(1)}%</td>
        </tr>`;
      }).join("");

      // ── Recent trades (last 5 days)
      const recentDays = hist.slice(-5).reverse();
      const tradeRows = recentDays.flatMap(day =>
        (day.trades || []).map(t => {
          const color = t.type === "TRIM" ? "#ff6b6b" : "#4ecdc4";
          const sign = t.type === "TRIM" ? "-" : "+";
          return `<tr>
            <td style="color:#556677">${day.date?.slice(5)||""}</td>
            <td style="color:${color};font-weight:700">${t.type === "TRIM" ? "✂️" : "⚡"} ${t.type}</td>
            <td style="font-weight:600">${t.symbol}</td>
            <td style="text-align:right">${sign}${Math.abs(t.shares).toFixed(2)}</td>
            <td style="text-align:right">$${t.price?.toFixed(2)||"—"}</td>
            <td style="text-align:right;color:${color}">$${t.value?.toFixed(0)||"—"}</td>
            <td style="color:#556677;font-size:9px">${t.signal||""}</td>
          </tr>`;
        })
      ).join("");

      document.getElementById("app").innerHTML = `
        <div class="header"><div><h1>PORTFOLIO STRATEGY HUB</h1><div class="sub">PAPER TRADER — SIMULATED PERFORMANCE</div></div>
          <div class="meta"><div class="timestamp">Updated: ${ts}</div><button class="refresh-btn" onclick="loadData()">REFRESH</button></div></div>
        ${tabsHTML}
        ${stats}
        ${chartHTML}
        <div class="ranking" style="margin-top:0">
          <div class="section-title">HOLDINGS</div>
          <table><thead><tr><th>SYMBOL</th><th style="text-align:right">SHARES</th><th style="text-align:right">PRICE</th><th style="text-align:right">VALUE</th><th style="text-align:right">WEIGHT</th><th style="text-align:right">P&L</th><th style="text-align:right">P&L %</th></tr></thead>
          <tbody>${holdingRows}</tbody></table>
        </div>
        ${tradeRows ? `
        <div class="ranking" style="margin-top:28px">
          <div class="section-title">RECENT TRADES (LAST 5 DAYS)</div>
          <table><thead><tr><th>DATE</th><th>ACTION</th><th>SYMBOL</th><th style="text-align:right">SHARES</th><th style="text-align:right">PRICE</th><th style="text-align:right">AMOUNT</th><th>SIGNAL</th></tr></thead>
          <tbody>${tradeRows}</tbody></table>
        </div>` : ""}`;
    }

    // ─── CLAIRE TAB ─────────────────────────────────────────────────────────
    function renderClaire(ts, tabsHTML) {
      if (!CLAIRE) {
        document.getElementById("app").innerHTML = `
          <div class="header"><div><h1>PORTFOLIO STRATEGY HUB</h1><div class="sub">TODAY IN THE PORTFOLIO</div></div>
            <div class="meta"><div class="timestamp">Updated: ${ts}</div><button class="refresh-btn" onclick="loadData()">REFRESH</button></div></div>
          ${tabsHTML}
          <div class="status"><div class="icon">💬</div><div class="msg">No Claire update yet</div>
            <div class="detail">The Claire summary runs once per day after signals are generated. Trigger the Claire Summary workflow from the Actions tab for an immediate update.</div></div>`;
        return;
      }

      const generated = CLAIRE.generated_at ? new Date(CLAIRE.generated_at).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }) : "—";

      const pillStyle = rec => {
        if (rec === "STRONG_BUY")  return "background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);color:#00ff88";
        if (rec === "BUY")         return "background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.25);color:#4ecdc4";
        if (rec === "TRIM" || rec === "SELL")
                                   return "background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.25);color:#ff6b6b";
        if (rec === "STRONG_SELL") return "background:rgba(255,51,85,0.08);border:1px solid rgba(255,51,85,0.25);color:#ff3355";
        return "background:rgba(85,102,119,0.04);border:1px solid rgba(85,102,119,0.12);color:#556677";
      };

      const rows = (CLAIRE.portfolio || []).map(sym => {
        const s = CLAIRE.summaries?.[sym] || {};
        const h = HOLDINGS[sym] || {};
        const rec = s.recommendation || "—";
        const label = rec === "—" ? "—" : rec.replace("_", " ");
        return `<tr>
          <td style="width:90px"><div style="font-weight:800;font-size:14px;color:${h.accent||'#e0e8f0'}">${sym}</div><div style="font-size:10px;color:#556677">${h.name||""}</div></td>
          <td style="width:130px"><span class="role-badge" style="${pillStyle(rec)}">${label}</span></td>
          <td style="color:#b8c8d8;font-size:12px;line-height:1.6">${s.sentence || "No update today."}</td>
        </tr>`;
      }).join("");

      document.getElementById("app").innerHTML = `
        <div class="header"><div><h1>PORTFOLIO STRATEGY HUB</h1><div class="sub">TODAY IN THE PORTFOLIO — PLAIN ENGLISH UPDATE</div></div>
          <div class="meta"><div class="timestamp">Updated: ${ts}</div><button class="refresh-btn" onclick="loadData()">REFRESH</button></div></div>
        ${tabsHTML}
        <div class="ranking"><div class="section-title">CLAIRE'S DAILY BRIEF</div>
          <div class="section-sub">Generated ${generated}</div>
          <table><tbody>${rows}</tbody></table></div>`;
    }

    // ─── DETAIL VIEW ────────────────────────────────────────────────────────
    function showDetail(sym) {
      const s = DATA.normalized.find(d => d.symbol === sym);
      if (!s) return;
      const h = HOLDINGS[sym] || {};
      const overlay = document.getElementById("detailOverlay");
      const content = document.getElementById("detailContent");
      const scoreCards = ["tactical","positional","strategic","composite"].map(layer => {
        const d = layer === "composite" ? s.composite : s[layer];
        const z = s.z?.[layer]; const det = d?.det_score ?? ""; const llm = d?.llm_score ?? "";
        return `<div class="score-card"><div class="layer">${layer}</div>
          <div class="score-val" style="color:${scoreColor(d?.score??0)}">${d?.score??"—"}</div>
          ${z!=null?`<span style="font-size:12px;color:${zColor(z)};font-weight:600">z:${z.toFixed(2)}</span>`:""}
          ${det!==""?`<div style="font-size:9px;color:#445566;margin-top:4px">D:${det} L:${llm}</div>`:""}
          <div style="font-size:10px;color:${scoreColor(d?.score??0)};font-weight:700;margin-top:6px">${d?.signal||d?.recommendation||"—"}</div>
          <div class="rationale">${d?.rationale||d?.summary||"—"}</div></div>`;
      }).join("");
      const risks = (s.risks||[]).map(r => `<div class="item">• ${r}</div>`).join("");
      const catalysts = (s.catalysts||[]).map(c => `<div class="item">• ${c}</div>`).join("");
      content.innerHTML = `
        <button class="detail-back" onclick="hideDetail()">← BACK</button>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
          <div><div style="display:flex;align-items:baseline;gap:12px"><span style="font-size:36px;font-weight:800;color:${h.accent||'#e0e8f0'}">${sym}</span><span style="font-size:16px;color:#667788">${h.name||""}</span></div></div>
          <div style="text-align:right"><div style="font-size:28px;font-weight:700;color:#e0e8f0">$${s.price?.current?.toFixed?.(2)??"—"}</div>
            ${s.price?.change_pct!=null?`<div style="font-size:14px;font-weight:600;color:${pctColor(s.price.change_pct)}">${fmtPct(s.price.change_pct)}</div>`:""}</div></div>
        <div class="score-grid">${scoreCards}</div>
        ${s.key_metric?.name?`<div class="info-box" style="margin-bottom:14px"><div class="box-title" style="color:#445566">KEY METRIC</div><div style="display:flex;align-items:baseline;gap:10px"><span style="font-size:11px;color:#889aaa">${s.key_metric.name}:</span><span style="font-size:16px;font-weight:700;color:#e0e8f0">${s.key_metric.value}</span></div></div>`:""}
        <div class="info-row">
          <div class="info-box"><div class="box-title" style="color:#ff6b6b">RISKS</div>${risks||'<div class="item">—</div>'}</div>
          <div class="info-box"><div class="box-title" style="color:#4ecdc4">CATALYSTS</div>${catalysts||'<div class="item">—</div>'}</div></div>`;
      overlay.classList.add("active");
      window.scrollTo(0,0);
    }
    function hideDetail() { document.getElementById("detailOverlay").classList.remove("active"); }
    document.getElementById("detailOverlay").addEventListener("click", e => { if (e.target === e.currentTarget) hideDetail(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") hideDetail(); });

    loadData();
  </script>
</body>
</html>
