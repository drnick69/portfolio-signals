name: Calibration Summary

# Runs after attribute-signals.mjs has updated forward returns.
# Reads docs/history/signals_with_returns.jsonl and produces
# docs/history/calibration.json for the Calibration dashboard tab.
on:
  schedule:
    - cron: "30 22 * * 1-5"  # 22:30 UTC weekdays — 30 min after attribute-signals
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: calibration-summary
  cancel-in-progress: false

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run calibration summary
        run: node .github/scripts/calibration-summary.mjs

      # v2 (July 2026): temporal z baselines + divergence/falsifier/regime audits.
      # Reporting only — writes calibration-v2.json; changes no parameters.
      # generate-signals v8.2.0 reads the temporal-z section next morning.
      - name: Run calibration v2
        run: node .github/scripts/calibration-v2.mjs

      - name: Commit calibration output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history/calibration.json docs/history/calibration-v2.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(calibration): update summary [auto]"
            git push
          fi
