name: Claire Summary
# Runs immediately after the Daily Portfolio Signal workflow completes
# successfully, producing plain-English one-liners per holding for the Claire
# tab on the hub. Triggered by workflow completion (not cron) so daily-log.jsonl
# is guaranteed fresh when Claire reads it.
on:
  workflow_run:
    workflows: ["Daily Portfolio Signal"]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: claire-summary
  cancel-in-progress: false
jobs:
  summarize:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Claire summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/claire-summary.mjs
      - name: Commit claire.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history/claire.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(claire): daily summary [auto]"
            git push
          fi
