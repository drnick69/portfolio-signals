name: Attribute Signals

# Runs every weekday after US market close to fill in forward returns
# as each horizon becomes available. Also runs on-demand.
on:
  schedule:
    # 22:00 UTC = 18:00 ET = ~2 hours after close. Gives Alpaca time to
    # settle the day's bars before we try to pull them.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

# Required so the workflow can commit the updated JSONL back to the repo
permissions:
  contents: write

concurrency:
  group: attribute-signals
  cancel-in-progress: false

jobs:
  attribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run attribution
        env:
          ALPK: ${{ secrets.ALPK }}
          ALPS: ${{ secrets.ALPS }}
        run: node scripts/attribute-signals.mjs

      - name: Commit enriched log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history/signals_with_returns.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(attribution): update forward returns [auto]"
            git push
          fi
