name: Rebuild signals.csv (one-shot fix)

# Manual trigger only — run once from the Actions tab after deploying
# log-signals.mjs v8.0 and rebuild-signals-csv.mjs. Rebuilds signals.csv
# from daily-log.jsonl under the unified 109-column header and commits the
# result (plus a one-time backup of the old file).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild signals.csv from daily-log.jsonl
        run: node .github/scripts/rebuild-signals-csv.mjs

      - name: Commit rebuilt CSV + backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history/signals.csv docs/history/signals.csv.pre-rebuild.bak
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "One-shot fix: rebuild signals.csv from daily-log.jsonl under unified v8.0 header"
          git push
