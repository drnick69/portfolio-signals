name: Risk Language Diff

# Weekly SEC EDGAR risk-factor section diff (risk-language-diff.mjs v1.0).
# Slow-moving fundamental signal: filings change quarterly at most, so weekly
# is already generous headroom. Sunday 14:00 UTC — outside the daily-signal
# and calibration windows, so no commit races on docs/history/.
# v1 is a data producer only: writes docs/history/risk-language.json; nothing
# consumes it yet (prompt integration is a separate, explicitly-approved step).
on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: risk-language
  cancel-in-progress: false

jobs:
  diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Selftest (offline, no EDGAR traffic)
        run: node .github/scripts/risk-language-diff.mjs --selftest

      - name: Run risk-language diff
        run: node .github/scripts/risk-language-diff.mjs

      - name: Commit risk-language.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history/risk-language.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(risk-language): weekly EDGAR risk-section diff [auto]"
            git pull --rebase origin main
            git push
          fi
