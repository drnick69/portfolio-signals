name: Daily Portfolio Signal

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch Market Data
        env:
          FK: ${{ secrets.FK }}
          TD_KEY: ${{ secrets.TD_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          ALPK: ${{ secrets.ALPK }}
          ALPS: ${{ secrets.ALPS }}
        run: node .github/scripts/fetch-market-data.mjs

      - name: Generate Portfolio Signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-signals.mjs

      - name: Send Email via Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: node .github/scripts/send-email.mjs

      - name: Save signal data to repo
        run: |
          mkdir -p docs/history
          cp /tmp/signal-data.json docs/signal-data.json
          cp /tmp/signal-email.html docs/latest-email.html

      - name: Log signal history
        run: node .github/scripts/log-signals.mjs

      - name: Run paper trader
        run: node .github/scripts/paper-trader.mjs

      - name: Commit updated signal data
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio-signals"
          git add docs/signal-data.json docs/latest-email.html docs/history/
          git diff --staged --quiet || git commit -m "Signal update $(date -u +%Y-%m-%d)"
          git push
